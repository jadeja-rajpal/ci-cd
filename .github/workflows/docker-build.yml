name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Frontend

      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
          ./frontend

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # Backend

      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
          ./backend

      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
            
            docker pull jadeja123/frontend:latest
            docker pull jadeja123/backend:latest
      
            docker stop frontend || true
            docker rm frontend || true
      
            docker stop backend || true
            docker rm backend || true
      
            docker run -d \
            --name backend \
            -p 5000:5000 \
            yourusername/backend:latest
      
            docker run -d \
            --name frontend \
            -p 80:80 \
            yourusername/frontend:latest
      